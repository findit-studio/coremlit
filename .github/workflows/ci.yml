name: CI
on:
  push: { branches: [main, feat/core] }
  pull_request:
jobs:
  check:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo hack test -p whisperkit --each-feature
      - run: cargo build -p whisperkit --examples
      # speakerkit: compile the `dia` bridge surface and enforce the DER-gate
      # suite, which the default-feature workspace steps above never touch. F1
      # made the public `dia` feature lean (`default-features = false` on the dia
      # dep — no `ort`, no bundled ONNX), so `--features dia` here builds only
      # dia's pure-Rust offline core; no Models/ tree is downloaded.
      - run: cargo test -p speakerkit --features dia
      # The DER binaries are `#![cfg(feature = "dia-oracle")]`: without it they
      # compile to nothing and a deleted gate, a lost `#[ignore]`, or a weakened
      # mutation-proof pin would merge green. The inventory compiles them under
      # `dia-oracle` (the ONLY step that pulls `ort`, to get dia's own
      # segmentation/embedding oracle), lists each required gate as present +
      # still ignored, and runs each binary's hermetic ordinary (falsifiability)
      # suite. The heavy model-gated gates stay `#[ignore]`d — no models needed.
      - run: crates/speakerkit/tests/der_gate_inventory.sh
      # Feature-combination parity with the whisperkit step above. `dia-oracle`
      # is excluded so this stays on dia's pure-Rust core (no `ort`); the oracle
      # binaries are already compiled+exercised by the inventory step.
      - run: cargo hack test -p speakerkit --each-feature --exclude-features dia-oracle
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
  model-tests:
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - name: Restore model cache
        id: models
        uses: actions/cache@v4
        with:
          path: |
            Models/whisperkit-coreml/openai_whisper-tiny
            Models/tokenizers/whisper-tiny
          key: models-${{ hashFiles('MODELS_LOCK') }}
      - name: Download models (cache miss)
        if: steps.models.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail

          # MODELS_LOCK is the source of truth for what gets downloaded, not
          # just a cache-busting key: it has a fixed two-table shape (the
          # whisperkit-coreml model repo, selector field `include`; then the
          # tokenizer repo, selector field `files`), each with its own
          # `revision`. Pull repo/selector/revision out by hand instead of
          # hardcoding them here, so a MODELS_LOCK edit is what changes what
          # this job downloads — no TOML crate needed for two fixed tables.
          lock=MODELS_LOCK

          table_header() { # Nth `["..."]` header line, unquoted.
            sed -n 's/^\["\(.*\)"\]$/\1/p' "$lock" | sed -n "${1}p"
          }
          table_field() { # value of `key = "..."` inside the Nth table.
            awk -v n="$1" -v key="$2" '
              /^\[/ { seen++; in_table = (seen == n); next }
              in_table && $1 == key {
                line = $0
                sub(/^[^=]*=[ \t]*"/, "", line)
                sub(/"[ \t]*$/, "", line)
                print line
                exit
              }
            ' "$lock"
          }

          model_repo=$(table_header 1)
          model_include=$(table_field 1 include)
          model_revision=$(table_field 1 revision)
          tokenizer_repo=$(table_header 2)
          tokenizer_files=$(table_field 2 files)
          tokenizer_revision=$(table_field 2 revision)
          read -ra tokenizer_files_arr <<< "$tokenizer_files"

          echo "MODELS_LOCK: model=$model_repo@$model_revision include=$model_include"
          echo "MODELS_LOCK: tokenizer=$tokenizer_repo@$tokenizer_revision files=$tokenizer_files"

          # Fail LOUD on any empty extraction: `hf download repo` with no
          # selector silently fetches the WHOLE repository, so a future
          # MODELS_LOCK format drift must stop the job here, not download
          # different content than the lock intends.
          for v in model_repo model_include model_revision tokenizer_repo tokenizer_files tokenizer_revision; do
            if [ -z "${!v}" ]; then
              echo "::error::MODELS_LOCK parse produced empty '$v' — format drift? fix the lock or the parser" >&2
              exit 1
            fi
          done

          pipx install "huggingface_hub[cli]"
          hf download "$model_repo" --include "$model_include" --revision "$model_revision" \
            --local-dir Models/whisperkit-coreml
          hf download "$tokenizer_repo" "${tokenizer_files_arr[@]}" --revision "$tokenizer_revision" \
            --local-dir Models/tokenizers/whisper-tiny
      # codex r6 F1: build.rs UN-ignores the fp16 graph sweep
      # (`every_shipped_model_graph_survives_fp16`) when Models/ is present, so
      # the `-- --ignored` (ignored-ONLY) runs below EXCLUDE it exactly when the
      # models are here — and the modelless `check` job skips it too (ignored
      # there). Run the coremlit sweep binary's ordinary suite here so a newly
      # vanishing fp16 guard cannot merge green; the inventory proves the sweep
      # is ordinary-not-ignored under cfg(models_present). NOTE: this runner
      # downloads WHISPER ONLY (per MODELS_LOCK), so the sweep here audits the
      # whisper graphs; the speakerkit/alignkit/argmax defect pins have no vendor
      # present and are a local/dev gate.
      # codex r6 F3: the fp16 sweep enforces a vendor manifest — every vendor
      # named by a KNOWN_DEFECTS pin must be present, or deleting a whole vendor
      # would silently disable its pins. This runner is WHISPER-ONLY, so declare
      # that scope EXPLICITLY: COREMLIT_FP16_SWEEP_VENDORS narrows the manifest to
      # the vendor actually downloaded here. The absent speakerkit/alignkit/argmax
      # pins are NOT verified on CI — a local/dev gate with the full Models/ tree
      # does that. The override is fail-closed (unset would demand EVERY pinned
      # vendor), so narrowing coverage is an explicit, reviewable act here, never a
      # silent skip. See the coverage-boundary note in
      # crates/coremlit/tests/fp16_guards.rs.
      - run: COREMLIT_FP16_SWEEP_VENDORS=whisperkit-coreml cargo test -p coremlit --test fp16_guards
      - run: crates/coremlit/tests/fp16_sweep_inventory.sh
      - run: cargo test -p coremlit -- --ignored
      - run: cargo test -p whisperkit -- --ignored
