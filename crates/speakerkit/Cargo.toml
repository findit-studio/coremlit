[package]
name = "speakerkit"
description = "Native CoreML segmentation and embedding backends for the dia speaker-diarization pipeline"
version.workspace = true
edition.workspace = true
# Unpublishable until the `diarization` dependency publishes (the `dia` git
# dependency has no registry version); flip when it does.
publish = false
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "../../README.md"
keywords = ["diarization", "speaker", "coreml", "speech", "ane"]
categories = ["multimedia::audio", "os::macos-apis", "science"]

[package.metadata.docs.rs]
all-features = true
default-target = "aarch64-apple-darwin"
targets = ["aarch64-apple-darwin"]

[dependencies]
coremlit.workspace = true
thiserror.workspace = true

# `dia` (its own package name is `diarization`) is the offline clustering
# engine, consumed as a RUNTIME dependency: clustering is a public runtime
# capability of this crate (`Extraction::diarize`), not a test-only harness
# step. Call sites read `dia::offline::diarize_offline` etc. (design spec §5).
#
# Pinned to the public diarization repo by EXACT rev, not a sibling path: a
# path dep breaks a fresh `cargo metadata` on any checkout lacking the sibling,
# because Cargo loads a path-dep manifest at resolution time. This rev IS the
# repo's `origin/main` and the exact offline surface every green gate ran
# against.
#
# `default-features = false` is load-bearing. dia's defaults are
# `["ort", "bundled-segmentation"]`; dropping them keeps the runtime clustering
# path free of BOTH onnxruntime AND dia's ~6 MB embedded ONNX segmentation
# model (speakerkit brings its own CoreML models). dia's whole clustering stack
# (`offline::diarize_offline`, `plda`, `reconstruct`, `aggregate`, `pipeline`,
# `cluster`) is public and un-gated, so it is fully usable with no default
# features.
#
# ORT-FREE PROOF — the runtime configuration pulls no `ort` crate:
#   cargo tree -p speakerkit -e normal | grep -iw ort   # → no match
# Contrast — the test-only oracle feature DOES pull it:
#   cargo tree -p speakerkit --features dia-oracle -e normal | grep -iw ort
dia = { package = "diarization", git = "https://github.com/findit-studio/diarization", rev = "b6a6f9adc8465f7a4c207dbaa2701d98e1be1ff2", default-features = false }
serde = { workspace = true, optional = true }

[features]
default = []
# TEST-ONLY oracle. Adds dia's OWN ort inference path (bundled `segmentation-3.0`
# + BYO fp32 WeSpeaker ONNX) so the DER parity suites (`parity_e2e`,
# `parity_shipping_der`, `generate_goldens`) can measure speakerkit's CoreML
# output against dia-ort. Purely ADDITIVE over the always-on runtime `dia` dep
# (cargo features are additive): it turns ON dia's `ort` + `bundled-segmentation`,
# so the runtime build stays ort-free while a test build with this feature gets
# the full ONNX oracle. `dia/bundled-segmentation` already implies `dia/ort`;
# both are named for clarity.
dia-oracle = ["dia/ort", "dia/bundled-segmentation"]
serde = ["dep:serde"]

[dev-dependencies]
hound.workspace = true
serde_json.workspace = true
sha2.workspace = true

[lints]
workspace = true
