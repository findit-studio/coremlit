# --- embeddings::granite ---
# The whole `embeddings::granite` module is feature-gated, so its tests compile
# only under `granite`. The tokenizer-identity gate is hermetic (committed
# goldens, no model) and runs in the default `granite` suite; the model_io /
# parity / placement gates keep their `#[ignore]` + Models/ layout. There is NO
# oracle feature — parity scores against COMMITTED transformers-fp32 goldens.
