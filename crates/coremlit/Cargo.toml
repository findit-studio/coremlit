path = "benches/whisper/rtf.rs"
harness = false
required-features = ["whisper"]

# `test = true` compiles this example under the libtest harness too, so its
# inline #[cfg(test)] hermetic BoundedAudioQueue tests run under `cargo test`;
# `main` is compiled (type-checked) but never executed, so no microphone opens.
[[example]]
