# rtf.rs is compiled BOTH as a harness-less bench (its real end-to-end main)
# and, under the default libtest harness, as this test target so its inline
# #[cfg(test)] `models_ready` gate runs under `cargo test`. Cargo prints an
# informational "present in multiple build targets" note for the shared path,
