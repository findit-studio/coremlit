[package]
name = "vadkit"
description = "Native CoreML Silero VAD model layer (FluidInference unified-256ms), backend for the silero detector seam"
version.workspace = true
edition.workspace = true
# Unpublishable: the sole dependency, `coremlit`, is an unpublished
# path+version workspace member (crates.io would reject a publish whose
# `coremlit 0.1.0` dependency it cannot resolve). Flip once `coremlit`
# publishes. When T5 adds the `silero` seam dependency it is a released
# version dep, so it does not change this constraint.
publish = false
rust-version.workspace = true
license.workspace = true
repository.workspace = true
readme = "README.md"
keywords = ["vad", "voice-activity-detection", "silero", "coreml", "speech"]
categories = ["multimedia::audio", "os::macos-apis", "science"]

[package.metadata.docs.rs]
all-features = true
default-target = "aarch64-apple-darwin"
targets = ["aarch64-apple-darwin"]

[dependencies]
coremlit.workspace = true
thiserror.workspace = true
# The detection/streaming logic single-home (spec ¬ß2-¬ß3): vadkit implements
# silero's `VadBackend` seam over CoreML and re-exports silero's detector
# surface wired to that backend, authoring ZERO segmentation logic here.
# `default-features = false` selects the LOGIC-ONLY silero crate ‚Äî the
# backend-agnostic detector/segmenter, `SpeechOptions`, the `VadBackend` trait,
# and `detect_speech_with` ‚Äî with NO `ort`/ONNX backend compiled, so `ort`
# never enters vadkit's runtime graph (`cargo tree -p vadkit -e no-dev -i ort`
# is empty; the cross_backend dev-dep below is the only thing that pulls ONNX,
# and resolver v3 keeps its features out of the non-dev build).
# Pinned to the 0.5.0 seam by git REV; RE-PIN to `silero = "0.5.0"` (a released
# version dep, no git) once it publishes (spec ¬ß8.3) ‚Äî which does not change
# this no-`ort`, logic-only posture.
silero = { git = "https://github.com/Findit-AI/silero", rev = "80f78c1a514f5c4e423e2a8d04d3b853b37079a0", default-features = false }

[dev-dependencies]
hound.workspace = true
serde_json.workspace = true
sha2.workspace = true
# Cross-backend characterization oracle (`tests/cross_backend.rs`, spec ¬ß6):
# the silero ONNX reference stack ‚Äî `Session::bundled()` + `detect_speech` ‚Äî
# is what the CoreML model layer is measured against, and the real
# `SpeechSegmenter` (the seam's streaming shape) is what the gate now drives to
# turn vadkit's probabilities into segments instead of the interim T4 harness
# (T5's re-export). The `bundled` feature pulls ONNX/`ort`; DEV-ONLY on purpose
# ‚Äî `ort` must never enter vadkit's runtime graph. Resolver v3 keeps dev-dep
# features out of the non-dev build, so `cargo tree -p vadkit -e no-dev -i ort`
# stays empty (the T5 report records the proof). SAME git rev as the runtime
# dep above (bumped from the crates.io 0.4.0 T4 used, since the seam's
# `SpeechSegmenter`/`detect_speech_with` are 0.5.0 additions); RE-PIN to
# `silero = { version = "0.5.0", features = ["bundled"] }` once it publishes.
silero = { git = "https://github.com/Findit-AI/silero", rev = "80f78c1a514f5c4e423e2a8d04d3b853b37079a0", default-features = false, features = ["bundled"] }

[lints]
workspace = true
